[build]
builder = "nixpacks"

[deploy]
# Runs migrations + collects static files, then starts the ASGI server.
startCommand = "python manage.py migrate --noinput && python manage.py collectstatic --noinput && daphne taskhive.asgi:application --port $PORT --bind 0.0.0.0"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
