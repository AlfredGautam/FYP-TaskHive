<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>500 — Server Error | TaskHive</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #fff5f5;
      background-image: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(239,68,68,0.10) 0%, transparent 60%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      color: #0f172a;
    }
    .card {
      text-align: center;
      max-width: 480px;
      padding: 48px 32px;
      background: #fff;
      border-radius: 24px;
      border: 1px solid #fee2e2;
      box-shadow: 0 8px 40px -8px rgba(239,68,68,0.12);
    }
    .logo {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, #ef4444, #dc2626);
      border-radius: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      color: #fff; font-size: 22px;
      box-shadow: 0 4px 14px rgba(239,68,68,0.35);
      margin-bottom: 24px;
    }
    .code {
      font-size: 96px;
      font-weight: 700;
      letter-spacing: -4px;
      background: linear-gradient(135deg, #ef4444, #dc2626);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 16px;
    }
    h1 { font-size: 22px; font-weight: 700; color: #0f172a; margin-bottom: 8px; }
    p { font-size: 14px; color: #64748b; line-height: 1.6; margin-bottom: 28px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 28px;
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: #fff; font-size: 14px; font-weight: 600;
      border-radius: 10px; text-decoration: none;
      box-shadow: 0 4px 14px -2px rgba(239,68,68,0.4);
      transition: all 0.2s ease;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px -4px rgba(239,68,68,0.5); }
    .btn-ghost {
      background: none;
      color: #64748b; border: 1px solid #e2e8f0;
      box-shadow: none;
      margin-left: 8px;
    }
    .btn-ghost:hover { background: #f8fafc; box-shadow: none; color: #334155; transform: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><i class="fas fa-circle-exclamation"></i></div>
    <div class="code">500</div>
    <h1>Something went wrong</h1>
    <p>An unexpected server error occurred. Our team has been notified.<br>Please try again in a moment.</p>
    <div>
      <a href="javascript:history.back()" class="btn"><i class="fas fa-rotate-left"></i> Go Back</a>
      <a href="/workspace/" class="btn btn-ghost"><i class="fas fa-house"></i> Workspace</a>
    </div>
  </div>
</body>
</html>
