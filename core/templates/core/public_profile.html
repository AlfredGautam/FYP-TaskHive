{% verbatim %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskHive - Public Profile</title>
  <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen" style="font-family:'Inter',sans-serif">
  <div id="app" class="max-w-4xl mx-auto px-4 py-8">
    <a href="/user/" class="inline-flex items-center text-sm text-indigo-600 hover:text-indigo-700 mb-6 font-medium">
      <i class="fas fa-arrow-left mr-2 text-xs"></i> Back
    </a>

    <div class="bg-white border border-gray-200 rounded-2xl overflow-hidden shadow-sm">
      <div class="h-44 bg-gradient-to-r from-indigo-50 to-slate-100 relative">
        <img v-if="profile.cover_url" :src="profile.cover_url" class="absolute inset-0 w-full h-full object-cover" alt="cover" />
      </div>

      <div class="px-6 pb-6 -mt-10">
        <img :src="profile.photo_url || defaultPhoto" class="w-24 h-24 rounded-full border-4 border-white bg-white object-cover shadow-md" alt="profile" />
        <h1 class="text-2xl font-bold text-slate-900 mt-4">{{ profile.display_name || profile.name || 'User' }}</h1>
        <p class="text-sm text-slate-500">@{{ profile.username_public || username }}</p>
        <p class="text-sm text-slate-700 mt-3 font-medium">{{ profile.tagline || '' }}</p>
        <p class="text-sm text-slate-500 mt-3 whitespace-pre-line leading-relaxed">{{ profile.bio || 'No bio provided.' }}</p>

        <div class="mt-5 flex flex-wrap gap-2 text-sm">
          <a v-if="profile.github" :href="profile.github" target="_blank" class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-gray-50 border border-gray-200 text-gray-700 hover:border-indigo-400 hover:text-indigo-600 transition-colors"><i class="fab fa-github text-xs"></i>GitHub</a>
          <a v-if="profile.linkedin" :href="profile.linkedin" target="_blank" class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-gray-50 border border-gray-200 text-gray-700 hover:border-indigo-400 hover:text-indigo-600 transition-colors"><i class="fab fa-linkedin text-xs"></i>LinkedIn</a>
          <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-gray-50 border border-gray-200 text-slate-500"><i class="fas fa-envelope text-xs"></i>{{ profile.email }}</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    new Vue({
      el: '#app',
      data() {
        return {
          username: '',
          defaultPhoto: 'https://cdn-icons-png.flaticon.com/512/149/149071.png',
          profile: {},
        };
      },
      async mounted() {
        const parts = window.location.pathname.split('/').filter(Boolean);
        this.username = decodeURIComponent(parts[1] || '');
        await this.loadProfile();
      },
      methods: {
        async loadProfile() {
          if (!this.username) return;
          try {
            const res = await fetch(`/api/profile/public/${encodeURIComponent(this.username)}/`, { credentials: 'same-origin' });
            const data = await res.json().catch(() => ({}));
            if (!res.ok || !data.ok) return;
            this.profile = data.profile || {};
          } catch (e) {
            // no-op
          }
        },
      },
    });
  </script>
</body>
</html>
{% endverbatim %}
