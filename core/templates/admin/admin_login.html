<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TaskHive Admin — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',system-ui,sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#1e1b4b 0%,#312e81 40%,#4f46e5 100%);
  color:#1e293b;
}
.login-card{
  background:#fff;
  border-radius:20px;
  box-shadow:0 25px 60px rgba(0,0,0,.25);
  width:100%;
  max-width:420px;
  padding:40px 36px;
  animation:fadeUp .4s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

.logo{
  text-align:center;
  margin-bottom:28px;
}
.logo .icon{
  font-size:2.4rem;
  margin-bottom:4px;
}
.logo h1{
  font-size:1.4rem;
  font-weight:800;
  color:#1e293b;
  letter-spacing:-.3px;
}
.logo p{
  font-size:.82rem;
  color:#94a3b8;
  margin-top:4px;
}

.form-group{
  margin-bottom:18px;
}
.form-group label{
  display:block;
  font-size:.78rem;
  font-weight:700;
  color:#64748b;
  text-transform:uppercase;
  letter-spacing:.5px;
  margin-bottom:7px;
}
.form-group input{
  width:100%;
  padding:12px 16px;
  border:2px solid #e2e8f0;
  border-radius:10px;
  font-size:.92rem;
  font-family:inherit;
  outline:none;
  transition:border .2s,box-shadow .2s;
  background:#f8fafc;
}
.form-group input:focus{
  border-color:#4f46e5;
  box-shadow:0 0 0 3px rgba(79,70,229,.12);
  background:#fff;
}

.error-msg{
  background:#fef2f2;
  border:1px solid #fecaca;
  color:#dc2626;
  border-radius:10px;
  padding:10px 14px;
  font-size:.82rem;
  font-weight:600;
  margin-bottom:18px;
  text-align:center;
}

.btn-login{
  width:100%;
  padding:13px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#4f46e5,#6366f1);
  color:#fff;
  font-size:.95rem;
  font-weight:700;
  font-family:inherit;
  cursor:pointer;
  transition:all .2s;
  box-shadow:0 4px 14px rgba(79,70,229,.35);
  margin-top:4px;
}
.btn-login:hover{
  background:linear-gradient(135deg,#4338ca,#4f46e5);
  transform:translateY(-1px);
  box-shadow:0 6px 20px rgba(79,70,229,.4);
}

.footer{
  text-align:center;
  margin-top:24px;
  font-size:.75rem;
  color:#94a3b8;
}

.lock-icon{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:50px;
  height:50px;
  background:linear-gradient(135deg,#4f46e5,#6366f1);
  border-radius:14px;
  margin-bottom:12px;
  box-shadow:0 4px 14px rgba(79,70,229,.3);
}
.lock-icon svg{
  width:24px;
  height:24px;
  color:#fff;
}
</style>
</head>
<body>

<div class="login-card">
  <div class="logo">
    <div class="lock-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h1>🧊 TaskHive Admin</h1>
    <p>Superuser credentials required</p>
  </div>

  {% if form.errors %}
  <div class="error-msg">
    Invalid username or password. Please try again.
  </div>
  {% endif %}

  <form method="post" action="{% url 'admin:login' %}">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ next }}">

    <div class="form-group">
      <label for="id_username">Username</label>
      <input type="text" name="username" id="id_username" autofocus autocapitalize="none" autocomplete="username" placeholder="Enter your username" required>
    </div>

    <div class="form-group">
      <label for="id_password">Password</label>
      <input type="password" name="password" id="id_password" autocomplete="current-password" placeholder="Enter your password" required>
    </div>

    <button type="submit" class="btn-login">Sign In to Admin</button>
  </form>

  <div class="footer">
    TaskHive &copy; 2026 &mdash; Admin access is restricted to superusers only.
  </div>
</div>

</body>
</html>
